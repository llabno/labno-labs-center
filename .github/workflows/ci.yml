name: CI — Lint & Build Check

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  lint-and-build:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint --if-present

      - name: Build
        run: npm run build
        env:
          VITE_SUPABASE_URL: https://placeholder.supabase.co
          VITE_SUPABASE_ANON_KEY: placeholder-key-for-build-check

      - name: Check for build output
        run: |
          if [ ! -d "dist" ]; then
            echo "Build failed — no dist/ directory created"
            exit 1
          fi
          echo "Build succeeded — $(find dist -type f | wc -l) files generated"
